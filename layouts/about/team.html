{{ define "main" }}
  {{ $headshots := sort (readDir "static/images/team/headshots-webp") "Name" }}

  <div class="team-page">
    <section class="team-hero section-hero">
      <div class="team-hero__media section-hero__media" aria-hidden="true"></div>
      <div class="shell team-hero__inner section-hero__inner">
        <div class="team-hero__copy section-hero__copy">
          <h1>{{ .Title }}</h1>
        </div>
      </div>
    </section>

    <section class="team-intro-banner section-banner">
      <div class="shell page-shell section-banner__inner">
        <div class="prose team-intro-banner__copy section-banner__copy">
          {{ .Content }}
        </div>
      </div>
    </section>

    <section class="team-grid-section">
      <div class="shell">
        <div class="team-grid" aria-label="Team members">
          {{ range $headshots }}
            {{ $name := replace (replaceRE "\\.[^.]+$" "" .Name) "_" " " }}
            <figure class="team-card">
              <div class="team-card__frame">
                <img
                  class="team-card__image"
                  src="{{ printf "/images/team/headshots-webp/%s" .Name | relURL }}"
                  alt="{{ $name }}"
                  loading="lazy"
                  decoding="async">
              </div>
              <figcaption class="team-card__name">{{ $name }}</figcaption>
            </figure>
          {{ end }}
        </div>
      </div>
    </section>
  </div>
{{ end }}
