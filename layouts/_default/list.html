{{ define "main" }}
  <section class="page-hero">
    <div class="shell">
      <p class="eyebrow">Section</p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.lead }}<p class="lead">{{ . }}</p>{{ end }}
    </div>
  </section>

  <section class="section">
    <div class="shell narrow-shell prose">
      {{ .Content }}
    </div>
  </section>
{{ end }}
